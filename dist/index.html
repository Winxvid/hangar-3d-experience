<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Redirect mobile users immediately to the AirProtect project
        // Checks for mobile user agent strings or very small screens
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768) {
            window.location.replace("airprotectdetail/index.html");
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangar 3D Experience (HTML)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-Dv38CDKa.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C2-8o4tl.css">
</head>
<body class="bg-slate-900 overflow-hidden font-sans antialiased text-white m-0 p-0 w-full h-full">

    <!-- Loading Screen -->
    <div id="loading-screen" class="absolute inset-0 flex items-center justify-center bg-[#050505] z-50 transition-opacity duration-1000">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4 mx-auto"></div>
            <p class="text-white/50 uppercase tracking-[0.2em] text-xs font-bold">Initializing Hangar...</p>
        </div>
    </div>

    <!-- WebGL Canvas -->
    <canvas id="webgl-canvas" class="absolute inset-0 w-full h-full z-0 block"></canvas>

    <!-- UI Overlay (Pointer Events None) -->
    <div id="ui-overlay" class="absolute inset-0 pointer-events-none z-10 transition-opacity duration-500">
        
        <!-- Hover Info -->
        <div id="hover-info" class="absolute bottom-12 left-1/2 -translate-x-1/2 w-full max-w-md text-center opacity-0 transition-opacity duration-300">
            <div class="p-8 rounded-3xl bg-white/10 backdrop-blur-xl border border-white/20 text-white">
                <h2 id="hover-title" class="text-3xl font-bold mb-2 uppercase tracking-tight"></h2>
                <p id="hover-desc" class="text-slate-400 text-lg"></p>
                <div class="mt-4 text-sm font-bold uppercase tracking-widest text-white/50">
                    Click to explore
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <div class="absolute bottom-12 right-12 text-white/30 text-xs uppercase tracking-[0.3em] font-bold">
            Drag to look around • Scroll to zoom • Click a door to enter
        </div>
    </div>

    <!-- Pages Container (Hidden by default) -->
    <div id="pages-container" class="fixed inset-0 z-50 bg-white overflow-y-auto hidden opacity-0 transition-opacity duration-500 text-slate-900 pointer-events-auto">
        <!-- Back Button -->
        <button id="back-btn" class="absolute top-8 left-8 p-3 rounded-full bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-md border border-white/20 z-20 mix-blend-difference text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        </button>

        <!-- Dynamic Content injected here via JS -->
        <div id="page-content" class="w-full h-full relative"></div>
    </div>

</body>
</html>
